// ---------- Long-term historical data (synthetic daily aggregates, 2025-01 to 2026-06) ----------
function buildHistorical(){
  const days = [];
  const start = new Date("2025-01-01T00:00:00+05:45");
  const end = new Date("2026-06-25T00:00:00+05:45");
  let cur = new Date(start);
  let i = 0;
  while (cur <= end) {
    const month = cur.getMonth();
    const dayOfWeek = cur.getDay();
    let base = 40 + Math.sin(i / 14) * 10;
    if (month === 0 && cur.getFullYear() === 2026) base += 60; // Jan 2026 spike (server outage)
    if (month === 4 && cur.getDate() >= 20 && cur.getDate() <= 26 && cur.getFullYear() === 2025) base += 45; // May outage
    if (cur.getFullYear() === 2026 && month === 5 && cur.getDate() >= 23) base += 25; // recent fee backlash
    const volume = Math.max(8, Math.round(base + (Math.sin(i * 1.7) * 6)));
    let negPct = 0.30 + Math.sin(i / 20) * 0.08;
    if (month === 0 && cur.getFullYear() === 2026) negPct = 0.58;
    if (cur.getFullYear() === 2026 && month === 5 && cur.getDate() >= 23) negPct = 0.5;
    negPct = Math.min(0.7, Math.max(0.15, negPct));
    const neuPct = 0.12 + Math.sin(i / 11) * 0.03;
    const posPct = Math.max(0.1, 1 - negPct - neuPct);
    days.push({
      date: new Date(cur),
      dateLabel: cur.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }),
      volume,
      positive: Math.round(volume * posPct),
      neutral: Math.round(volume * neuPct),
      negative: Math.round(volume * negPct),
      avgRating: +(2.2 + (1 - negPct) * 2.8).toFixed(2)
    });
    cur.setDate(cur.getDate() + 1);
    i++;
  }
  return days;
}

const historical = buildHistorical();

function aggregate(period){
  // period: 'daily' | 'weekly' | 'monthly' | 'yearly'
  if (period === 'daily') return historical.slice(-30);
  const map = new Map();
  historical.forEach(d => {
    let key;
    if (period === 'weekly') {
      const tmp = new Date(d.date);
      const day = tmp.getDay();
      tmp.setDate(tmp.getDate() - day);
      key = tmp.toISOString().slice(0,10);
    } else if (period === 'monthly') {
      key = `${d.date.getFullYear()}-${String(d.date.getMonth()+1).padStart(2,'0')}`;
    } else {
      key = `${d.date.getFullYear()}`;
    }
    if (!map.has(key)) map.set(key, { volume:0, positive:0, neutral:0, negative:0, count:0, ratingSum:0, label:key });
    const e = map.get(key);
    e.volume += d.volume; e.positive += d.positive; e.neutral += d.neutral; e.negative += d.negative;
    e.ratingSum += d.avgRating; e.count += 1;
  });
  return Array.from(map.values()).map(e => ({
    ...e,
    avgRating: +(e.ratingSum / e.count).toFixed(2),
    dateLabel: period === 'monthly'
      ? new Date(e.label + "-01").toLocaleDateString('en-US', { month:'short', year:'2-digit' })

}

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef, useMemo } = React;
const D = window.ESEWA_DATA;

// ============================================================
// SHARED HELPERS
// ============================================================
function sentimentOf(rating) {
  if (rating >= 4) return "positive";
  if (rating === 3) return "neutral";
  return "negative";
}

function summarizeSentiment(reviews) {
  const counts = { positive: 0, neutral: 0, negative: 0 };
  reviews.forEach(r => counts[sentimentOf(r.rating)]++);
  return counts;
}

function sentimentPercent(counts, total) {
  if (!total) return 0;
  return Math.round(counts / total * 100);
}

function matchKeyword(text, keyword) {
  const haystack = (text || "").toLowerCase();
  const tokens = (keyword || "").toLowerCase().split(/[\s/]+/).filter(Boolean);
  if (!tokens.length) return false;
  return tokens.some(token => haystack.includes(token));
}

function buildTrendSeries(reviews, period) {
  const grouped = new Map();
  reviews.forEach(r => {
    const d = new Date(r.date);
    let key;
    if (period === "daily") {
      key = d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    } else if (period === "weekly") {
      const start = new Date(d);
      start.setDate(start.getDate() - start.getDay());
      key = start.toISOString().slice(0, 10);
    } else if (period === "monthly") {
      key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    } else {
      key = `${d.getFullYear()}`;
    }
    if (!grouped.has(key)) grouped.set(key, { label: key, count: 0, dateLabel: key });
    grouped.get(key).count += 1;
  });
  return Array.from(grouped.values()).sort((a, b) => a.label.localeCompare(b.label));
}

function bucketMatches(date, bucketKey, period) {
  const d = new Date(date);
  if (period === "daily") {
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) === bucketKey;
  }
  if (period === "weekly") {
    const start = new Date(d);
    start.setDate(start.getDate() - start.getDay());
    return start.toISOString().slice(0, 10) === bucketKey;
  }
  if (period === "monthly") {
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}` === bucketKey;
  }
  return `${d.getFullYear()}` === bucketKey;
}

function deriveOutcome(review) {
  const text = (review.text || "").toLowerCase();
  if (review.rating >= 4 || /(works great|great|love|resolved|approved|reliable|convenient|fast|smooth|easy)/i.test(text)) return "success";
  return "failure";
}

function Stars({ rating }) {
  return (
    <span style={{ color: "#F0A93B", fontSize: 12, letterSpacing: 1 }}>
      {"★".repeat(rating)}{"☆".repeat(5 - rating)}
    </span>
  );
}

function sentimentOf(rating) {
  if (rating >= 4) return "positive";
  if (rating === 3) return "neutral";
  return "negative";
}

function sentimentColor(s) {
  if (s === "positive") return "#60BB46";
  if (s === "neutral") return "#F0A93B";
  return "#E5484D";
}

function Badge({ children, color, bg }) {
  return (
    <span style={{
      fontSize: 11, fontWeight: 600, padding: "3px 9px", borderRadius: 20,
      background: bg, color: color, whiteSpace: "nowrap"
    }}>{children}</span>
  );
}

function SentimentSummary({ reviews }) {
  const counts = summarizeSentiment(reviews);
  const total = reviews.length;
  const items = [
    { key: "positive", label: "Positive", value: counts.positive, color: "var(--esewa-green)" },
    { key: "neutral", label: "Neutral", value: counts.neutral, color: "var(--amber)" },
    { key: "negative", label: "Negative", value: counts.negative, color: "var(--red)" }
  ];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(120px, 1fr))", gap: 8, marginBottom: 12 }}>
      {items.map(item => (
        <div key={item.key} style={{ background: "var(--bg-soft)", border: "1px solid var(--border-soft)", borderRadius: 10, padding: "10px 12px" }}>
          <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: "0.04em", color: "var(--text-faint)", marginBottom: 4 }}>{item.label}</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: item.color }}>{item.value} {total ? `(${sentimentPercent(counts[item.key], total)}%)` : "(0%)"}</div>
        </div>
      ))}
    </div>
  );
}

function KeywordReviewBox({ keyword, reviews }) {
  const matches = reviews.filter(r => matchKeyword(r.text, keyword));
  return (
    <div style={{ border: "1px solid var(--border-soft)", borderRadius: 12, padding: 12, background: "var(--bg-soft)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
        <span style={{ fontSize: 12, fontWeight: 700, color: "var(--text-main)" }}>{keyword}</span>
        <Badge color="#27500A" bg="#eaf6e6">{matches.length} match{matches.length === 1 ? "" : "es"}</Badge>

      <SentimentSummary reviews={matches} />

    </div>

}

function MetricTile({ label, value, sub, color }) {

function useChart(ref, config, deps) {
  useEffect(() => {
    if (!ref.current) return;
    const chart = new Chart(ref.current, config);
    return () => chart.destroy();
    // eslint-disable-next-line
  }, deps);
}

function SentimentTrendChart() {
  const [period, setPeriod] = useState("monthly");
  const [selectedPoint, setSelectedPoint] = useState(null);
  const ref = useRef(null);
  const data = useMemo(() => D.aggregate(period), [period]);
  const sliced = period === "daily" ? data.slice(-30) : period === "weekly" ? data.slice(-16) : data;
  const reviewsForPoint = useMemo(() => {
    if (!selectedPoint) return [];
    return D.reviews.filter(r => bucketMatches(r.date, selectedPoint, period));
  }, [selectedPoint, period]);

  useChart(ref, {
    type: "line",
    data: {
      labels: sliced.map(d => d.dateLabel),
      datasets: [
        { label: "Positive", data: sliced.map(d => d.positive), borderColor: "#60BB46", backgroundColor: "rgba(96,187,70,0.1)", tension: 0.3, fill: false, pointRadius: 4, pointHoverRadius: 6 },
        { label: "Neutral", data: sliced.map(d => d.neutral), borderColor: "#F0A93B", backgroundColor: "rgba(240,169,59,0.1)", tension: 0.3, fill: false, pointRadius: 4, pointHoverRadius: 6 },
        { label: "Negative", data: sliced.map(d => d.negative), borderColor: "#E5484D", backgroundColor: "rgba(229,72,77,0.1)", tension: 0.3, fill: false, pointRadius: 4, pointHoverRadius: 6 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      onClick: (_, elements) => {
        if (!elements?.length) return;
        const idx = elements[0].index;
        setSelectedPoint(sliced[idx]?.dateLabel || null);
      },
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 10 }, maxRotation: 0, autoSkip: true }, grid: { display: false } },
        y: { ticks: { font: { size: 10 } }, grid: { color: "#eef1f4" } }
      }
    }
  }, [period, sliced]);

  return (

              <div style={{ fontSize: 11, color: "var(--text-soft)" }}>Fail rate: <b style={{ color: "var(--red)" }}>{c.failRate}%</b></div>
            </div>
          ))}
        </div>
      </Card>
      <Card>
        <SectionTitle icon="ti-message-2">User reports</SectionTitle>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 10 }}>
          {reviews.slice(0, 8).map(r => <ReviewCard key={r.id} r={r} />)}
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// ISOLATED DASHBOARD: CUSTOMER SUPPORT
// ============================================================
function SupportDashboard() {
  const data = D.supportData;
  const [period, setPeriod] = useState("monthly");
  const [selectedPoint, setSelectedPoint] = useState(null);
  const ref = useRef(null);
  const trendData = useMemo(() => D.aggregate(period).slice(-8), [period]);
  const trendRef = useRef(null);
  useChart(ref, {
    type: "doughnut",
    data: {
      labels: data.channelPrefs.map(c => c.channel),
      datasets: [{ data: data.channelPrefs.map(c => c.pct), backgroundColor: ["#1C3F60","#60BB46","#F0A93B","#94a3b8"], borderWidth: 3, borderColor: "#fff" }]
    },
    options: { responsive: true, maintainAspectRatio: false, cutout: "62%", plugins: { legend: { display: false } } }
  }, []);
  const reviewsForPoint = useMemo(() => {
    if (!selectedPoint) return [];
    return D.reviews.filter(r => bucketMatches(r.date, selectedPoint, period));
  }, [selectedPoint, period]);
  useChart(trendRef, {
    type: "line",
    data: { labels: trendData.map(d => d.dateLabel), datasets: [{ label: "Support reviews", data: trendData.map(d => d.volume), borderColor: "#E5484D", backgroundColor: "rgba(229,72,77,0.12)", tension: 0.3, fill: true, pointRadius: 3 }] },
    options: { responsive: true, maintainAspectRatio: false, onClick: (_, elements) => { if (!elements?.length) return; setSelectedPoint(trendData[elements[0].index]?.dateLabel || null); }, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 10 }, maxRotation: 0, autoSkip: true }, grid: { display: false } }, y: { ticks: { font: { size: 10 } }, grid: { color: "#eef1f4" } } } }
  }, [trendData]);
  const reviews = D.focusReviews.filter(r => r.category === "support");
  return (
    <div>
      <DashboardHeader icon="ti-headset" title="Customer support dashboard" subtitle="Hold times, satisfaction ratings, communication channel preferences" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 16 }}>
        <MetricTile label="Total incidents" value={data.totalIncidents} color="var(--red)" />
        <MetricTile label="Avg hold time" value={`${data.avgHoldTimeMin} min`} />
        <MetricTile label="Satisfaction score" value={`${data.satisfactionScore}/5`} color="var(--red)" />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1.2fr", gap: 12, marginBottom: 16 }} className="responsive-2col">
        <Card>
          <SectionTitle icon="ti-chart-donut">Channel preferences</SectionTitle>
          <div style={{ position: "relative", height: 190 }}><canvas ref={ref} role="img" aria-label="Donut chart of customer support channel preferences: phone, in-app chat, email, social media"></canvas></div>
        </Card>
        <Card>
          <SectionTitle icon="ti-list">Channel breakdown</SectionTitle>
          {data.channelPrefs.map((c,i) => (
            <div key={c.channel} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <span style={{ width: 10, height: 10, borderRadius: 3, background: ["#1C3F60","#60BB46","#F0A93B","#94a3b8"][i], flexShrink: 0 }}></span>
              <span style={{ fontSize: 12, flex: 1 }}>{c.channel}</span>
              <span style={{ fontSize: 12, fontWeight: 700 }}>{c.pct}%</span>
            </div>
          ))}
        </Card>
      </div>
      <Card>
        <SectionTitle icon="ti-message-2">User reports</SectionTitle>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 10 }}>
          {reviews.slice(0, 8).map(r => <ReviewCard key={r.id} r={r} />)}
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// ISOLATED DASHBOARD: APP PERFORMANCE & BUGS
// ============================================================
function AppPerformanceDashboard() {
  const reviews = D.focusReviews.filter(r => r.category === "performance");
  const stat = D.categoryStats.performance;
  const chartRef = useRef(null);
  const categories = ["Crash", "Freeze", "Slow load"];
  const values = [142, 98, 116];
  useChart(chartRef, {
    type: "bar",
    data: { labels: categories, datasets: [{ data: values, backgroundColor: ["#E5484D", "#F0A93B", "#60BB46"], borderRadius: 6 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 10 } } }, y: { grid: { color: "#eef1f4" }, ticks: { font: { size: 10 } } } } }
  }, []);
  return (
    <div>
      <DashboardHeader icon="ti-bug" title="App performance and bugs" subtitle="Crashes, freezes, slow load times, and UI rendering issues" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, marginBottom: 16 }}>
        <MetricTile label="Total incidents" value={stat.count} color="var(--red)" sub={`${stat.trend} this month`} />
        <MetricTile label="Crash reports" value="142" />
        <MetricTile label="Freeze reports" value="98" />
        <MetricTile label="Slow load reports" value="116" />
      </div>
      <Card style={{ marginBottom: 16 }}>
        <SectionTitle icon="ti-chart-bar">Crash / freeze / slow load report counts</SectionTitle>
        <div style={{ position: "relative", height: 220 }}><canvas ref={chartRef} role="img" aria-label="Bar chart comparing crash, freeze, and slow load reports"></canvas></div>
      </Card>
      <Card>
        <SectionTitle icon="ti-message-2">User reports</SectionTitle>
        <SentimentSummary reviews={reviews} />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 10 }}>
          {reviews.slice(0, 10).map(r => <ReviewCard key={r.id} r={r} />)}
        </div>
      </Card>
    </div>
  );
}

function DashboardHeader({ icon, title, subtitle }) {
  return (
    <div style={{ marginBottom: 18 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <i className={`ti ${icon}`} style={{ fontSize: 20, color: "var(--esewa-green)" }}></i>
        <h1 style={{ fontSize: 20, fontWeight: 800, margin: 0 }}>{title}</h1>
      </div>
      <div style={{ fontSize: 12.5, color: "var(--text-soft)" }}>{subtitle}</div>
    </div>
  );
}

// ============================================================
// REVIEW ANALYSIS SUB-VIEWS (from sidebar accordion)
// ============================================================
function ReviewAnalysisView({ groupKey }) {
  const group = D.reviewAnalysisGroups[groupKey];
  const catMap = { systemFailures: "performance", paymentDropouts: "payment", uiConfusion: "performance" };
  const keywordMap = {
    systemFailures: ["Server", "Crash", "Down", "Timeout", "Freeze"],
    paymentDropouts: ["Failed", "Deducted", "Stuck", "Pending", "Transaction"],
    uiConfusion: ["Confusing", "Can't Find", "Hidden", "Unseen"]
  };
  const reviews = D.reviews.filter(r => r.category === catMap[groupKey]);
  const keywordRef = useRef(null);
  const counts = keywordMap[groupKey].map(keyword => ({ keyword, count: reviews.filter(r => matchKeyword(r.text, keyword)).length }));
  useChart(keywordRef, {
    type: "bar",
    data: { labels: counts.map(c => c.keyword), datasets: [{ data: counts.map(c => c.count), backgroundColor: ["#1C3F60", "#60BB46", "#F0A93B", "#E5484D", "#94a3b8"], borderRadius: 6 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { font: { size: 10 } } }, y: { grid: { color: "#eef1f4" }, ticks: { font: { size: 10 } } } } }
  }, [groupKey]);
  return (
    <div>
      <DashboardHeader icon="ti-message-2-bolt" title={group.label} subtitle={`Grouped from the wider review dataset · ${group.count} matching reviews`} />
      <Card style={{ marginBottom: 16 }}>
        <SectionTitle icon="ti-tags">Matched keywords</SectionTitle>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {keywordMap[groupKey].map(ex => (
            <span key={ex} style={{ fontSize: 12, padding: "5px 12px", borderRadius: 20, background: "#eaf6e6", color: "#27500A", fontWeight: 600 }}>{ex}</span>
          ))}
        </div>
      </Card>
      <Card style={{ marginBottom: 16 }}>
        <SectionTitle icon="ti-chart-bar">Issue frequency by keyword</SectionTitle>
        <div style={{ position: "relative", height: 220 }}><canvas ref={keywordRef} role="img" aria-label="Bar chart of review issues by keyword"></canvas></div>
      </Card>
      <Card>
        <SectionTitle icon="ti-message-2">Keyword-specific review panels</SectionTitle>
        <SentimentSummary reviews={reviews} />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 10 }}>
          {keywordMap[groupKey].map(keyword => <KeywordReviewBox key={keyword} keyword={keyword} reviews={reviews} />)}
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// SUGGESTIONS ENGINE SUB-VIEWS (from sidebar accordion)
// ============================================================
function SuggestionsView({ groupKey }) {
  const group = D.suggestionGroups[groupKey];
  const reviews = useMemo(() => {
    if (groupKey === "paymentOptimizations") {
      return D.reviews.filter(r => r.category === "payment" || /(payment|refund|transaction|deducted|pending)/i.test(r.text));
    }
    if (groupKey === "infrastructureUpgrades") {
      return D.reviews.filter(r => r.category === "performance" || /(server|crash|down|timeout|freeze|lag|slow)/i.test(r.text));
    }
    return D.reviews.filter(r => r.category === "support" || /(support|follow up|resolved|customer service|callback)/i.test(r.text));
  }, [groupKey]);
  return (
    <div>
      <DashboardHeader icon="ti-bulb" title={group.label} subtitle={`Solution-oriented feedback grouped into actionable categories · ${group.count} suggestions`} />
      <Card>
        <SectionTitle icon="ti-bulb">Topic-specific improvement suggestions</SectionTitle>
        <SentimentSummary reviews={reviews} />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 10 }}>
          {reviews.slice(0, 10).map(r => (
            <div key={r.id} style={{
              padding: "13px 14px", borderRadius: 11, border: "1px solid var(--border-soft)",
              background: "#f7fcf6", borderLeft: "3px solid var(--esewa-green)"
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 700 }}>{r.name}</span>
                <i className="ti ti-bulb" style={{ fontSize: 13, color: "var(--esewa-green)" }}></i>
              </div>
              <div style={{ fontSize: 12, color: "var(--text-soft)", lineHeight: 1.5 }}>{r.text}</div>
              <div style={{ fontSize: 10, color: "var(--text-faint)", marginTop: 6 }}>{r.dateLabel} NPT</div>
            </div>
          ))}
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// PROBLEM STATEMENT SUB-VIEWS (MPIN / KYC / OTP / Support already built above as full dashboards)
// ============================================================

// ============================================================
// APP SHELL
// ============================================================
function App() {
  const [view, setView] = useState("main");
  const [mobileOpen, setMobileOpen] = useState(false);
  const [theme, setTheme] = useState("light");
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchQuery, setSearchQuery] = useState("");

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const searchResults = useMemo(() => {
    if (!searchQuery.trim()) return [];
    const query = searchQuery.toLowerCase();
    return D.reviews.filter(r => [r.text, r.category, r.name, r.dateLabel].join(" ").toLowerCase().includes(query));
  }, [searchQuery]);

  const titles = {
    main: "Main dashboard",
    paymentGateway: "Payment gateway monitor",
    failedTransactions: "Transaction failures",
    appPerformance: "App performance and bugs",
    mpin: "MPIN dashboard",
    kyc: "KYC dashboard",
    otp: "OTP dashboard",
    support: "Customer support dashboard",
    systemFailures: "Review analysis",
    paymentDropouts: "Review analysis",
    uiConfusion: "Review analysis",
    customerCare: "Suggestions engine",
    paymentOptimizations: "Suggestions engine",
    infrastructureUpgrades: "Suggestions engine"
  };

  function renderView() {
    switch (view) {
      case "main": return <MainDashboard />;
      case "paymentGateway": return <PaymentGatewayDashboard />;
      case "failedTransactions": return <FailedTransactionsDashboard />;
      case "appPerformance": return <AppPerformanceDashboard />;
      case "mpin": return <MpinDashboard />;
      case "kyc": return <KycDashboard />;
      case "otp": return <OtpDashboard />;
      case "support": return <SupportDashboard />;
      case "systemFailures": case "paymentDropouts": case "uiConfusion":
        return <ReviewAnalysisView groupKey={view} />;
      case "customerCare": case "paymentOptimizations": case "infrastructureUpgrades":
        return <SuggestionsView groupKey={view} />;
      default: return <MainDashboard />;
    }
  }

  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <Sidebar view={view} setView={(v) => { setView(v); setMobileOpen(false); }} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, padding: "14px 16px",
          background: "var(--esewa-navy)", position: "sticky", top: 0, zIndex: 10
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={() => setMobileOpen(true)} style={{ background: "none", border: "none", color: "#fff", cursor: "pointer", display: "none" }} className="mobile-menu-btn">
              <i className="ti ti-menu-2" style={{ fontSize: 22 }}></i>
            </button>
            <span style={{ color: "#fff", fontWeight: 700, fontSize: 14 }}>{titles[view] || "Dashboard"}</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, justifyContent: "flex-end" }}>
            <div style={{ position: "relative", maxWidth: 320, width: searchOpen ? "100%" : 0, overflow: "hidden", transition: "width 0.2s ease" }}>
              <input value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="Search reviews, keywords, sections" style={{ width: "100%", border: "none", borderRadius: 999, padding: "8px 12px", fontSize: 12, color: "var(--text-main)", background: "var(--search-bg)" }} />
            </div>
            <button onClick={() => { setSearchOpen(s => !s); if (!searchOpen) setSearchQuery(""); }} style={{ background: "rgba(255,255,255,0.12)", border: "none", borderRadius: 999, color: "#fff", cursor: "pointer", padding: "8px 10px" }}>
              <i className="ti ti-search" style={{ fontSize: 15 }}></i>
            </button>
            <button onClick={() => setTheme(t => t === "light" ? "dark" : "light")} style={{ background: "rgba(255,255,255,0.12)", border: "none", borderRadius: 999, color: "#fff", cursor: "pointer", padding: "8px 10px" }}>
              <i className={`ti ti-${theme === "light" ? "moon" : "sun"}`} style={{ fontSize: 15 }}></i>
            </button>
          </div>
        </div>
        {searchOpen && searchQuery && (
          <Card style={{ margin: "14px 16px 0", padding: 12 }}>
            <SectionTitle icon="ti-search">Search results</SectionTitle>
            <div style={{ display: "grid", gap: 8, maxHeight: 260, overflowY: "auto" }}>
              {searchResults.length ? searchResults.slice(0, 12).map(r => <ReviewCard key={r.id} r={r} />) : <div style={{ fontSize: 12, color: "var(--text-faint)" }}>No results found.</div>}
            </div>
          </Card>
        )}
        <div style={{ padding: "24px 28px 60px" }} className="main-content-pad">
          {renderView()}
        </div>
      </div>
      <style>{`
        @media (max-width: 900px) {
          .sidebar-desktop { display: none !important; }
          .mobile-menu-btn { display: block !important; }
          .main-content-pad { padding: 16px 14px 40px !important; }
          .focus-grid { grid-template-columns: 1fr !important; }
          .responsive-2col { grid-template-columns: 1fr !important; }
        }
        @media (min-width: 901px) {
          .mobile-close { display: none !important; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
